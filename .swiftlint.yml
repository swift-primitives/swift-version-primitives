# SwiftLint configuration
# Inherits from the shared parent configuration in swift-standards

parent_config: https://raw.githubusercontent.com/swift-primitives/.github/main/.swiftlint.yml

# Package-specific overrides
disabled_rules:
  - function_parameter_count
  - comma                        # Conflicts with swift-format: swift-format's Spacing rule mandates no space after the comma in @_implements(Protocol,Requirement) attribute argument lists, which swiftlint's comma rule would flag. swift-format is authoritative on formatting (mirrors the parent config's opening_brace disable).
